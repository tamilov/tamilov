kind = "web"
previewPath = "/"
title = "Tamilov Brand Page"
version = "1.0.0"
id = "artifacts/tamilov"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20880

[services.development]
run = "pnpm --filter @workspace/tamilov run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tamilov", "run", "build" ]
publicDir = "artifacts/tamilov/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20880"
BASE_PATH = "/"
